# Portable project-scoped Codex defaults and policy.
#
# Mutable state belongs in the user's normal Codex home, not this tracked file.
# Keep trust, credentials, provider secrets, telemetry targets, notification
# commands, absolute paths, and machine-local settings out.

project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["instructions.md"]
model_reasoning_effort = "xhigh"
model_verbosity = "medium"
web_search = "cached"
model = "gpt-5.6-sol"
# service_tier = "fast"
approvals_reviewer = "user"
approval_policy = "never"
sandbox_mode = "danger-full-access"
network_access = "enabled"

[agents]
max_threads = 4
max_depth = 1

[features]
hooks = true
memories = true
network_proxy = true
prevent_idle_sleep = true

[tui]
status_line = ["model-with-reasoning", "model", "run-state", "weekly-limit", "five-hour-limit", "task-progress"]
status_line_use_colors = true
terminal_title = ["activity", "project-name", "five-hour-limit", "weekly-limit", "task-progress"]
theme = "catppuccin-mocha"
